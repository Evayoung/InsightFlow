<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Surveys - InsightFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/styles/app.css"/>
</head><body>
<div id="root"></div>
<div class="toast-container" id="toast-rack"></div>
<div class="modal-overlay" id="modal-new-surv">
  <div class="modal lg">
    <div class="modal-header"><h3 class="modal-title" id="survey-modal-title">Create Survey</h3><button class="modal-close" onclick="closeModal('modal-new-surv')" aria-label="Close modal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div id="surv-error" class="alert alert-error" style="display:none"></div>
      <div class="form-group"><label class="form-label">Survey Title * <span class="inline-note">(3-140 characters)</span></label><input class="form-input" id="s-title" placeholder="e.g. Post-Purchase Feedback Q3" maxlength="140"/></div>
      <div class="form-group"><label class="form-label">Goal / Objective *</label><textarea class="form-textarea" id="s-goal" rows="3" placeholder="What do you want to learn from respondents?"></textarea></div>
      <div class="stack-grid-2">
        <div class="form-group"><label class="form-label">Target Audience</label><input class="form-input" id="s-audience" placeholder="e.g. New users in first 30 days"/></div>
        <div class="form-group"><label class="form-label">Language</label>
          <select class="form-select" id="s-lang"><option value="en">English</option><option value="fr">French</option><option value="es">Spanish</option><option value="de">German</option></select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Project *</label><select class="form-select" id="s-project"><option value="">Loading projects...</option></select></div>
      <div id="ai-create-fields" class="hidden">
        <div class="divider"></div>
        <div class="alert alert-info">AI mode creates the draft and immediately generates questions before opening the editor.</div>
        <div class="stack-grid-2">
          <div class="form-group"><label class="form-label">Question Count</label><input class="form-input" id="s-ai-count" type="number" min="3" max="20" value="8"/></div>
          <div class="form-group"><label class="form-label">Tone</label><select class="form-select" id="s-ai-tone"><option value="neutral">Neutral</option><option value="friendly">Friendly</option><option value="professional">Professional</option><option value="conversational">Conversational</option></select></div>
        </div>
        <div class="form-group"><label class="form-label">Constraints</label><textarea class="form-textarea" id="s-ai-constraints" rows="3" placeholder="One constraint per line"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-surv')">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-surv">Create Draft</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-pub-result">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title">Survey Published</h3><button class="modal-close" onclick="closeModal('modal-pub-result')" aria-label="Close modal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="alert alert-success">Your survey is live and accepting responses.</div>
      <div class="form-group"><label class="form-label">Public Survey Link</label>
        <div class="action-group">
          <input class="form-input" id="pub-url" readonly style="font-size:12px;color:#64748b;background:#f8fafc"/>
          <button class="btn btn-ghost btn-sm" id="btn-copy-link">Copy</button>
        </div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal('modal-pub-result')">Done</button></div>
  </div>
</div>
<div class="modal-overlay" id="modal-bias">
  <div class="modal lg">
    <div class="modal-header"><h3 class="modal-title">Bias Review Panel</h3><button class="modal-close" onclick="closeModal('modal-bias')" aria-label="Close modal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body" id="bias-body"><div style="display:flex;align-items:center;gap:8px;color:#94a3b8"><span class="spinner-dark"></span> Checking for bias...</div></div>
    <div class="modal-footer"><button class="btn btn-primary" onclick="closeModal('modal-bias')">Done</button></div>
  </div>
</div>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/pages/surveys.js"></script>
</body></html>
