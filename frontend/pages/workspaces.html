<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Workspaces - InsightFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/styles/app.css"/>
</head><body>
<div id="root"></div>
<div class="toast-container" id="toast-rack"></div>
<div class="modal-overlay" id="modal-new-ws">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title">Create Workspace</h3><button class="modal-close" onclick="closeModal('modal-new-ws')" aria-label="Close modal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Workspace Name *</label><input class="form-input" id="new-ws-name" placeholder="e.g. Acme Marketing"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-new-ws')">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-ws">Create Workspace</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-invite">
  <div class="modal">
    <div class="modal-header"><h3 class="modal-title">Invite Team Member</h3><button class="modal-close" onclick="closeModal('modal-invite')" aria-label="Close modal"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Email Address *</label><input class="form-input" id="invite-email" type="email" placeholder="colleague@company.com"/></div>
      <div class="form-group"><label class="form-label">Role</label>
        <select class="form-select" id="invite-role"><option value="admin">Admin</option><option value="editor" selected>Editor</option><option value="viewer">Viewer</option></select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-invite')">Cancel</button>
      <button class="btn btn-primary" id="btn-confirm-invite">Send Invite</button>
    </div>
  </div>
</div>
<script src="../assets/js/common.js"></script>
<script src="../assets/js/pages/workspaces.js"></script>
</body></html>
