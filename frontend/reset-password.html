<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Reset Password - InsightFlow</title>
<link rel="stylesheet" href="./assets/styles/app.css"/>
<style>
body {
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: 24px;
  background:
    radial-gradient(circle at top left, rgba(0,121,193,.18), transparent 30%),
    linear-gradient(180deg, #f8fbfe 0%, #eef2f7 100%);
}
.reset-card {
  width: min(520px, 100%);
  background: rgba(255,255,255,.98);
  border: 1px solid rgba(226,232,240,.9);
  border-radius: 28px;
  box-shadow: 0 30px 80px rgba(0,0,0,.08);
  padding: 30px;
}
.reset-brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: 999px;
  background: #eef7fc;
  color: #00457c;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.reset-title {
  margin: 18px 0 8px;
  font-family: "Plus Jakarta Sans", sans-serif;
  font-style: normal;
  font-size: 38px;
  line-height: 1.05;
}
.reset-copy {
  margin: 0 0 24px;
  color: #64748b;
  line-height: 1.6;
}
.rules {
  display: grid;
  gap: 8px;
  margin: 12px 0 0;
}
.rule {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #64748b;
  font-size: 12px;
}
.rule-dot {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: #cbd5e1;
}
.rule.ok { color: #047857; }
.rule.ok .rule-dot { background: #10b981; }
</style>
</head>
<body>
  <div class="reset-card">
    <div class="reset-brand">InsightFlow Access</div>
    <h1 class="reset-title">Reset your password</h1>
    <p class="reset-copy" id="reset-copy">Verifying your reset link before we show the password form.</p>
    <div id="toast-rack" class="toast-container"></div>
    <div id="reset-root">
      <div style="display:flex;align-items:center;gap:10px;color:#64748b">
        <span class="spinner-dark"></span>
        <span>Checking token...</span>
      </div>
    </div>
  </div>

<script src="./assets/js/common.js"></script>
<script src="./assets/js/pages/reset-password.js"></script>
</body>
</html>
